<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Город — дебаг</title>
<style>
  :root { --bg:#11141a; --panel:#1b1f28; --line:#2a3040; --txt:#dfe5ef; --mut:#8b96ab; --acc:#5aa0ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:14px/1.45 system-ui, sans-serif; }
  header { padding:9px 16px; background:#0d0f14; border-bottom:1px solid var(--line); display:flex; gap:14px; align-items:center; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header .mut { color:var(--mut); font-size:12px; }
  header a { margin-left:auto; color:var(--acc); text-decoration:none; }
  .seg { display:flex; border:1px solid var(--line); border-radius:7px; overflow:hidden; }
  .seg button { background:#161b24; color:var(--mut); border:0; padding:5px 13px; cursor:pointer; font-weight:600; font-size:13px; }
  .seg button.on { background:var(--acc); color:#06101f; }
  .wrap { display:flex; height:calc(100vh - 41px); }
  aside { width:320px; flex:none; overflow-y:auto; padding:12px; border-right:1px solid var(--line); background:var(--panel); }
  main { flex:1; overflow:hidden; background:#0c0e13; position:relative; }
  #citybg { position:absolute; inset:0; z-index:0; display:none; }
  #citybg svg, svg#map { width:100%; height:100%; }
  svg#map { position:absolute; inset:0; z-index:1; }
  .sub { margin:2px 0 2px 5px; font-size:11.5px; } .sub b { color:#cfe0ff; }
  section { margin-bottom:14px; }
  h2 { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--mut); margin:0 0 7px; border-bottom:1px solid var(--line); padding-bottom:4px; }
  label.row { display:flex; align-items:center; gap:7px; margin:4px 0; font-size:13px; cursor:pointer; }
  label.row input[type=number] { margin-left:auto; width:74px; }
  input[type=number], input[type=text] { background:#0e1117; border:1px solid var(--line); color:var(--txt); border-radius:5px; padding:3px 6px; }
  input[type=text] { width:100%; margin-bottom:5px; }
  .sw { width:11px; height:11px; border-radius:2px; flex:none; border:1px solid #0006; }
  button { background:var(--acc); color:#06101f; border:0; border-radius:6px; padding:7px 12px; font-weight:600; cursor:pointer; width:100%; margin-top:4px; }
  button.alt { background:#2a3140; color:var(--txt); width:auto; padding:5px 10px; margin:2px 4px 2px 0; }
  button.s { padding:3px 9px; font-size:12px; }
  .presets { display:flex; flex-wrap:wrap; }
  #info, #stats { font-size:12px; color:var(--mut); }
  #info b, #stats b, #route-pts b { color:var(--txt); }
  #route-pts { font-size:13px; margin-bottom:5px; }
  .ab { display:inline-block; min-width:14px; height:14px; border-radius:50%; text-align:center; line-height:14px; font-size:10px; color:#06101f; font-weight:700; margin-right:4px; }
  .step { font-size:12px; padding:1px 0; }
  .step .g, .g { color:var(--mut); }
  .pill { display:inline-block; background:#222a38; border-radius:4px; padding:1px 6px; margin:2px 3px 0 0; font-size:11px; }
  .hint { font-size:11px; color:var(--mut); margin:3px 0 6px; }
  /* плавающая карточка локации */
  #card { position:absolute; top:14px; right:14px; z-index:2; width:290px; max-height:calc(100% - 28px); overflow:auto; background:#171c25; border:1px solid #313a4c; border-radius:10px; box-shadow:0 10px 30px #0008; padding:0; }
  #card-name { color:#c9a8ff; }
  #card.hidden { display:none; }
  .card-h { display:flex; align-items:center; gap:8px; padding:9px 11px; border-bottom:1px solid var(--line); }
  .card-h b { font-size:13px; } #card-x { margin-left:auto; cursor:pointer; color:var(--mut); }
  #card-body { padding:9px 11px; font-size:12px; }
  .cl { margin:3px 0; } .cl b { color:#cfe0ff; }
  .card-btns { display:flex; gap:8px; padding:9px 11px; border-top:1px solid var(--line); }
  .card-btns button { margin:0; }
</style>
</head>
<body>
<header>
  <h1>🗺 Город</h1>
  <div class="seg"><button id="v-graph" class="on">Граф</button><button id="v-city">Готовый город</button></div>
  <span class="mut" id="sub">дебаг-визуализация</span>
  <a href="/npcdebug">NPC-стенд</a><a href="/">в игру</a>
</header>
<div class="wrap">
  <aside>
    <section>
      <h2>Генерация</h2>
      <label class="row">seed <input type="number" id="p-seed" value="1"></label>
      <label class="row">ключевых зданий <input type="number" id="p-key" value="12" min="0" max="40"></label>
      <label class="row">отрезок (px, 0=авто) <input type="number" id="p-seg" value="0" min="0" max="80"></label>
      <label class="row"><input type="checkbox" id="p-river" checked> река (мосты)</label>
      <label class="row"><input type="checkbox" id="p-walls" checked> стены (ворота)</label>
      <button id="gen">Сгенерировать</button>
    </section>
    <section>
      <h2>Маршрут A → B</h2>
      <div id="route-pts"><span class="ab" style="background:#37e06a">A</span><b id="ptA">—</b> &nbsp;
        <span class="ab" style="background:#ff8a3a">B</span><b id="ptB">—</b>
        <button class="alt s" id="route-reset" style="float:right">сброс</button></div>
      <div class="hint">Кликни здание/перекрёсток на карте → в карточке назначь точку A или B. Работает в обоих видах.</div>
      <div id="info">—</div>
    </section>
    <section id="sec-layers">
      <h2>Слои (граф)</h2>
      <div id="layers"></div>
      <div class="presets"><button class="alt" data-preset="debug">Дебаг</button><button class="alt" data-preset="final">Итог</button></div>
    </section>
    <section>
      <h2>Под-здания</h2>
      <div class="hint">Выбран: <b id="sel">—</b>.</div>
      <input type="text" id="sub-name" value="Подвал">
      <button class="alt" id="add-sub">+ под-здание к выбранному</button>
    </section>
    <section><h2>Статистика</h2><div id="stats">—</div></section>
  </aside>
  <main>
    <div id="citybg"></div>
    <svg id="map" viewBox="0 0 980 700" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="card" class="hidden">
      <div class="card-h"><b id="card-name"></b><span id="card-x">✕</span></div>
      <div id="card-body"></div>
      <div class="card-btns"><button class="s" style="background:#37e06a" id="card-a">точка A</button>
        <button class="s" style="background:#ff8a3a" id="card-b">точка B</button></div>
    </div>
  </main>
</div>
<script>
const NS = "http://www.w3.org/2000/svg", $ = id => document.getElementById(id);
function E(t, a, p) { const e = document.createElementNS(NS, t); for (const k in a) e.setAttribute(k, a[k]); if (p) p.appendChild(e); return e; }
const hue = id => (id * 47) % 360;
const WIND = { "С":"север","СВ":"северо-восток","В":"восток","ЮВ":"юго-восток","Ю":"юг","ЮЗ":"юго-запад","З":"запад","СЗ":"северо-запад" };
const LM = { river:"у реки", wall:"у стены", gate:"у ворот", bridge:"у моста" };
const SRV = { eat:"еда", drink:"выпивка", lodging:"ночлег", shop:"лавка", commission:"заказ", heal:"лечение", pray:"молитва", store:"склад" };

const LAYERS = [
  ["walls","Стены","#9a6",1],["river","Река","#39f",1],["edges","Дороги (рёбра)","#7a8499",1],
  ["doors","Двери/связи","#c46bff",1],["houses","Дома (по перекрёстку)","#c97",1],["points","Под-точки","#5aa0ff",0],
  ["route","Маршрут","#37e06a",1],["crossroads","Перекрёстки","#fff",1],["bridges","Мосты","#ef8a3a",1],
  ["gates","Ворота","#3ec06a",1],["interiors","Нутро/под-здания","#c46bff",1],["keys","Ключевые здания","#ff5050",1],
];
const PRESETS = { debug: LAYERS.map(l => l[0]), final: ["walls","river","edges","route","keys"] };

let DATA = null, PARAMS = null, VIEW = "graph", NX = {}, CITYSVG = {};
let routeA = null, routeB = null, lastRoute = null, cardRouteId = null, cardLabel = "", selBuilding = null;

function params() { return { seed:+$("p-seed").value, key_buildings:+$("p-key").value, river:$("p-river").checked, walls:$("p-walls").checked, segment:+$("p-seg").value||0 }; }
const qs = p => Object.entries(p).map(([k, v]) => k + "=" + encodeURIComponent(v)).join("&");

function buildLayerToggles() {
  const box = $("layers"); box.innerHTML = "";
  for (const [id, label, color, on] of LAYERS) {
    const l = document.createElement("label"); l.className = "row";
    const cb = document.createElement("input"); cb.type = "checkbox"; cb.checked = !!on; cb.dataset.layer = id;
    cb.onchange = () => { const g = $("L-" + id); if (g) g.style.display = cb.checked ? "" : "none"; };
    const sw = document.createElement("span"); sw.className = "sw"; sw.style.background = color;
    l.append(cb, sw, document.createTextNode(label)); box.appendChild(l);
  }
}
function applyToggles() { document.querySelectorAll("#layers input").forEach(cb => { const g = $("L-" + cb.dataset.layer); if (g) g.style.display = cb.checked ? "" : "none"; }); }
function setPreset(name) { const on = new Set(PRESETS[name] || []); document.querySelectorAll("#layers input").forEach(cb => cb.checked = on.has(cb.dataset.layer)); applyToggles(); }

async function generate() {
  PARAMS = params();
  const r = await fetch("/api/citydebug/generate?" + qs(PARAMS));
  if (!r.ok) { $("sub").textContent = "ошибка " + r.status + " (нужен вход владельцем)"; return; }
  DATA = await r.json(); NX = {}; DATA.nodes.forEach(n => NX[n.id] = n);
  routeA = routeB = lastRoute = null; $("ptA").textContent = $("ptB").textContent = "—"; $("card").classList.add("hidden");
  render(); showStats(); $("info").textContent = "—"; $("sub").textContent = "сцена готова";
}

function setView(v) {
  VIEW = v; $("v-graph").classList.toggle("on", v === "graph"); $("v-city").classList.toggle("on", v === "city");
  $("sec-layers").style.display = v === "graph" ? "" : "none";
  render();
}

function render() {
  const svg = $("map"); svg.innerHTML = "";
  svg.setAttribute("viewBox", `0 0 ${DATA.size.w} ${DATA.size.h}`);
  if (VIEW === "city") { $("citybg").style.display = "block"; ensureCitySvg(); renderCity(svg); }
  else { $("citybg").style.display = "none"; renderGraph(svg); }
  if (lastRoute) highlightRoute(lastRoute);
}
async function ensureCitySvg() {
  const k = qs(PARAMS);
  if (CITYSVG[k]) { $("citybg").innerHTML = CITYSVG[k]; return; }
  $("citybg").innerHTML = "<div style='color:#8b96ab;padding:22px'>рендер города…</div>";
  const d = await fetch("/api/citydebug/citysvg?" + k).then(r => r.json());
  CITYSVG[k] = d.svg; if (VIEW === "city") $("citybg").innerHTML = d.svg;
}

function renderGraph(svg) {
  const g = {}; for (const [id] of LAYERS) g[id] = E("g", { id: "L-" + id }, svg);
  if (DATA.walls.length) E("polygon", { points: DATA.walls.map(p => p.join(",")).join(" "), fill: "none", stroke: "#7e9a55", "stroke-width": 3, opacity: .8 }, g.walls);
  if (DATA.river.pts.length) E("polyline", { points: DATA.river.pts.map(p => p.join(",")).join(" "), fill: "none", stroke: "#2f6fae", "stroke-width": Math.max(4, DATA.river.w || 6), "stroke-opacity": .45, "stroke-linecap": "round" }, g.river);
  for (const e of DATA.edges) { const a = NX[e.a], b = NX[e.b];
    if (e.kind === "door" || e.kind === "internal") E("line", { x1: a.x, y1: a.y, x2: b.x, y2: b.y, stroke: "#c46bff", "stroke-width": 1.4, "stroke-dasharray": "3 2", opacity: .85 }, g.doors);
    else E("line", { x1: a.x, y1: a.y, x2: b.x, y2: b.y, stroke: e.bridge ? "#ef8a3a" : "#6b7488", "stroke-width": e.bridge ? 3 : 1 }, e.bridge ? g.bridges : g.edges); }
  for (const h of DATA.houses) E("circle", { cx: h.x, cy: h.y, r: 2, fill: `hsl(${hue(h.crossroad)} 60% 58%)`, "fill-opacity": .75 }, g.houses);
  for (const n of DATA.nodes) {
    if (n.kind === "point") E("circle", { cx: n.x, cy: n.y, r: 1.5, fill: "#5aa0ff", "fill-opacity": .8 }, g.points);
    else if (n.kind === "crossroad") clickable(E("circle", { cx: n.x, cy: n.y, r: 3, fill: "#fff", stroke: "#222", "stroke-width": 1 }, g.crossroads), n.id, n.id, null, "перекрёсток " + n.id);
    else if (n.kind === "bridge") E("rect", { x: n.x - 3, y: n.y - 3, width: 6, height: 6, fill: "#ef8a3a", transform: `rotate(45 ${n.x} ${n.y})` }, g.bridges);
    else if (n.kind === "gate") E("rect", { x: n.x - 3.5, y: n.y - 3.5, width: 7, height: 7, fill: "#3ec06a" }, g.gates);
    else if (n.kind === "interior") E("rect", { x: n.x - 2.5, y: n.y - 2.5, width: 5, height: 5, fill: "#c46bff", "fill-opacity": .9 }, g.interiors);
  }
  for (const kb of DATA.key_buildings) {
    const c = E("circle", { cx: kb.x, cy: kb.y, r: 5.5, fill: "#a855f7", stroke: "#fff", "stroke-width": 1.5 }, g.keys);
    c.style.cursor = "pointer"; c.onclick = ev => { ev.stopPropagation(); openBuilding(kb.id); };
    E("text", { x: kb.x + 8, y: kb.y + 4, fill: "#e8d0ff", "font-size": 11 }, g.keys).textContent = kb.name;
  }
  applyToggles();
}

function renderCity(svg) {
  E("g", { id: "L-route" }, svg);                         // под-слой маршрута (заполнит highlightRoute)
  const hot = E("g", {}, svg), marks = E("g", {}, svg);
  for (const h of DATA.houses) {                          // кликабельные хот-споты по ВСЕМ домам поверх рендера
    const c = E("circle", { cx: h.x, cy: h.y, r: 4, fill: "transparent" }, hot);
    c.style.cursor = "pointer"; c.onclick = ev => { ev.stopPropagation(); openBuilding(h.id); };
  }
  for (const kb of DATA.key_buildings) {                  // ключевые — монотонно-фиолетовая вывеска
    const c = E("circle", { cx: kb.x, cy: kb.y, r: 6, fill: "#a855f7", stroke: "#fff", "stroke-width": 2 }, marks);
    c.style.cursor = "pointer"; c.onclick = ev => { ev.stopPropagation(); openBuilding(kb.id); };
    const t = E("text", { x: kb.x + 9, y: kb.y + 4, fill: "#fff", "font-size": 12, "font-weight": 600, "paint-order": "stroke", stroke: "#0009", "stroke-width": 3 }, marks); t.textContent = kb.name;
  }
}

function clickable(el, locNode, routeId, buildingId, label) { el.style.cursor = "pointer"; el.onclick = ev => { ev.stopPropagation(); openCard(locNode, routeId, buildingId, label); }; return el; }

async function openCard(locNode, routeId, buildingId, label) {
  cardRouteId = routeId; cardLabel = label; selBuilding = buildingId; $("sel").textContent = buildingId || "—";
  const d = await fetch("/api/citydebug/location?" + qs(PARAMS) + "&node=" + locNode).then(r => r.json());
  $("card-name").textContent = label;
  const by = { road:[], enter:[], exit:[], internal:[] }; (d.moves || []).forEach(m => by[m.kind].push(m));
  let b = `<div class="cl g">узел ${locNode} · ${d.kind || "—"}</div>`;
  if (d.landmarks && d.landmarks.length) b += `<div class="cl">ориентиры: <b>${d.landmarks.map(t => LM[t] || t).join(", ")}</b></div>`;
  if (by.enter.length) b += `<div class="cl">🚪 вход: <b>${by.enter.map(m => m.name).join(", ")}</b></div>`;
  if (by.internal.length) b += `<div class="cl">↳ вглубь: ${by.internal.map(m => m.name).join(", ")}</div>`;
  if (by.road.length) b += `<div class="cl">→ дороги: ${by.road.map(m => WIND[m.heading] || m.heading).join(", ")}</div>`;
  if (d.nearby && d.nearby.length) b += `<div class="cl">рядом: ${d.nearby.map(n => n.name + " <span class='g'>(" + n.dist + "px)</span>").join(", ")}</div>`;
  $("card-body").innerHTML = b;
  $("card").classList.remove("hidden");
}

async function openBuilding(id) {
  cardRouteId = id; selBuilding = id; $("sel").textContent = id;
  $("card-name").textContent = "…"; $("card-body").innerHTML = "<span class='g'>загрузка…</span>"; $("card").classList.remove("hidden");
  const d = await fetch("/api/citydebug/building?" + qs(PARAMS) + "&bid=" + encodeURIComponent(id)).then(r => r.json());
  if (d.error) { $("card-body").innerHTML = d.error; return; }
  const e = d.data || {};
  cardLabel = d.sign || e.type || (d.is_key ? id : "Дом");
  $("card-name").textContent = cardLabel + (e.type ? " · " + e.type : "") + (d.is_key ? " 🪧" : "");
  let b = "";
  const meta = [e.tier, e.size, e.condition, e.age, e.lighting, e.foot_traffic].filter(Boolean);
  if (meta.length) b += `<div class="cl g">${meta.join(" · ")}</div>`;
  if (e.materials && (e.materials.walls || e.materials.roof)) b += `<div class="cl"><span class="g">материалы:</span> ${[e.materials.walls, e.materials.roof].filter(Boolean).join(" / ")}</div>`;
  if (e.services && e.services.length) b += `<div class="cl">${e.services.map(s => `<span class="pill">${SRV[s] || s}</span>`).join("")}</div>`;
  if (e.wares && e.wares.length) b += `<div class="cl"><span class="g">товар:</span> ${e.wares.join(", ")}</div>`;
  if (e.features && e.features.length) b += `<div class="cl">${e.features.map(x => `<span class="pill">${x}</span>`).join("")}</div>`;
  if (e.smells && e.smells.length) b += `<div class="cl g">пахнет: ${e.smells.join(", ")}</div>`;
  if (e.sounds && e.sounds.length) b += `<div class="cl g">слышно: ${e.sounds.join(", ")}</div>`;
  const soc = [e.occupants_kind, e.prosperity, e.reputation, e.hours].filter(Boolean);
  if (soc.length) b += `<div class="cl g">${soc.join(" · ")}</div>`;
  if (e.notable) b += `<div class="cl">🏷 ${e.notable}</div>`;
  if (e.secret) b += `<div class="cl">🔒 <span class="g">тайна:</span> ${e.secret.what}${e.secret.where ? " (" + e.secret.where + ")" : ""}${e.secret.gate ? " <span class='g'>· " + e.secret.gate + "</span>" : ""}</div>`;
  if (e.valuables && e.valuables.length) b += `<div class="cl">💰 ${e.valuables.join(", ")}</div>`;
  if (e.rumors && e.rumors.length) b += `<div class="cl g">слухи: ${e.rumors.join("; ")}</div>`;
  if (e.sub_rooms && e.sub_rooms.length) b += `<div class="cl"><span class="g">помещения:</span>${e.sub_rooms.map(s => `<div class="sub">└ <b>${s.name}</b> <span class="g">[${s.kind}/${s.access}]</span>${s.features && s.features.length ? " " + s.features.join(", ") : ""}${s.contents && s.contents.length ? " <span class='g'>· " + s.contents.join(", ") + "</span>" : ""}</div>`).join("")}</div>`;
  b += `<div class="cl g" style="margin-top:6px;border-top:1px solid #2a3040;padding-top:5px">узел ${d.node} · ${d.kind}${d.landmarks && d.landmarks.length ? " · " + d.landmarks.map(t => LM[t] || t).join(", ") : ""} · ${d.world ? "из БД мира " + d.world : "сгенерено"}</div>`;
  $("card-body").innerHTML = b;
}

function setRoutePoint(slot) {
  const pt = { id: cardRouteId, label: cardLabel };
  if (slot === "A") routeA = pt; else routeB = pt;
  $("ptA").textContent = routeA ? routeA.label : "—"; $("ptB").textContent = routeB ? routeB.label : "—";
  $("card").classList.add("hidden");
  if (routeA && routeB) computeRoute();
}
function resetRoute() { routeA = routeB = lastRoute = null; $("ptA").textContent = $("ptB").textContent = "—"; $("info").textContent = "—"; render(); }

async function computeRoute() {
  const r = await fetch("/api/citydebug/route?" + qs(PARAMS) + "&a=" + encodeURIComponent(routeA.id) + "&b=" + encodeURIComponent(routeB.id));
  const route = await r.json();
  if (!route.found) { $("info").innerHTML = "<b>маршрут не найден</b>"; lastRoute = null; render(); return; }
  lastRoute = route; render(); showRoute(route);
}

function showRoute(route) {
  const icon = { exit:"🚪", enter:"🚪", internal:"↳", road:"→" };
  const steps = route.steps.map(s => { const lab = s.kind === "road" ? (WIND[s.heading] || s.heading) : s.kind === "enter" ? `вход: ${s.name}` : s.kind === "exit" ? "выход на улицу" : `вглубь: ${s.name}`;
    return `<div class="step">${icon[s.kind]} <span class="g">${s.kind}</span> ${lab}</div>`; }).join("");
  const signs = route.signs.length ? route.signs.map(s => `<span class="pill">${s.name}</span>`).join("") : "<span class='g'>нет</span>";
  const lmStr = (route.landmarks || []).map(t => LM[t] || t).join(", ") || "—";
  const near = route.near_target ? `${route.near_target.name} (${route.near_target.dist}px)` : "—";
  $("info").innerHTML = `длина <b>${route.length}px</b> · перекрёстков <b>${route.crossroads.length}</b>` +
    `<div>направление: <b>${WIND[route.bearing] || route.bearing || "—"}</b></div>` +
    `<div>цель рядом с: <b>${near}</b></div><div>ориентиры цели: <b>${lmStr}</b></div>` +
    `<div style="margin:5px 0;max-height:200px;overflow:auto">${steps}</div>вывески по пути:<br>${signs}`;
}

function highlightRoute(route) {
  const g = $("L-route"); if (!g) return; g.innerHTML = "";
  E("polyline", { points: route.nodes.map(id => `${NX[id].x},${NX[id].y}`).join(" "), fill: "none", stroke: "#37e06a", "stroke-width": 4.5, "stroke-linejoin": "round", "stroke-linecap": "round", opacity: .95 }, g);
  const a = NX[route.nodes[0]], b = NX[route.nodes[route.nodes.length - 1]];
  E("circle", { cx: a.x, cy: a.y, r: 7, fill: "#37e06a", stroke: "#06101f", "stroke-width": 2 }, g);
  E("circle", { cx: b.x, cy: b.y, r: 7, fill: "#ff8a3a", stroke: "#06101f", "stroke-width": 2 }, g);
}

function showStats() {
  const s = DATA.stats, k = s.by_kind;
  $("stats").innerHTML = `узлов <b>${s.nodes}</b> · рёбер <b>${s.edges}</b> · отрезок <b>${s.interval}px</b><br>` +
    `перекрёстков <b>${k.crossroad || 0}</b> · точек <b>${k.point || 0}</b> · мостов <b>${k.bridge || 0}</b> · ворот <b>${k.gate || 0}</b><br>` +
    `домов <b>${s.houses}</b> · ключевых зданий <b>${s.key_buildings}</b>`;
}

async function addSubspace() {
  if (!selBuilding) { $("info").innerHTML = "сначала кликни здание"; return; }
  const name = $("sub-name").value || "Подвал";
  const d = await fetch("/api/citydebug/subspace?" + qs(PARAMS) + "&building=" + encodeURIComponent(selBuilding) + "&name=" + encodeURIComponent(name)).then(r => r.json());
  if (d.added == null) { $("info").innerHTML = "не удалось добавить под-здание"; return; }
  DATA = d.data; NX = {}; DATA.nodes.forEach(n => NX[n.id] = n); render(); showStats();
  $("info").innerHTML = `добавлено «${name}» (узел ${d.added}) к ${selBuilding}.`;
}

$("gen").onclick = generate;
$("v-graph").onclick = () => setView("graph"); $("v-city").onclick = () => setView("city");
$("route-reset").onclick = resetRoute;
$("card-x").onclick = () => $("card").classList.add("hidden");
$("card-a").onclick = () => setRoutePoint("A"); $("card-b").onclick = () => setRoutePoint("B");
$("add-sub").onclick = addSubspace;
document.querySelectorAll("[data-preset]").forEach(b => b.onclick = () => setPreset(b.dataset.preset));
buildLayerToggles();
generate();
</script>
</body>
</html>
