<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI-DnD — карта региона</title>
  <style>
    :root{--ink:#3a2a12;--line:#5a4222;--parch:#efe0bd}
    *{box-sizing:border-box}
    body{margin:0;background:#d8c49c;color:var(--ink);font-family:Georgia,'Iowan Old Style',serif}
    header{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 14px;background:#cbb079;border-bottom:2px solid var(--line)}
    header h1{font-size:17px;margin:0;font-style:italic;font-weight:500}
    header .sub{font-size:12px;opacity:.7}
    header .sp{flex:1}
    .ctl{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:8px 14px;background:#e3cfa3;border-bottom:1px solid var(--line)}
    .ctl label{font-size:12px}
    .ctl input{font:inherit;font-size:13px;padding:3px 6px;border:1px solid var(--line);border-radius:4px;background:#f6ecd2}
    .ctl input#do{flex:1;min-width:220px}
    .ctl input#seed,.ctl input#gold{width:70px}
    .btn{font:inherit;font-size:13px;cursor:pointer;padding:4px 12px;border:1px solid var(--line);border-radius:5px;background:#caa44a;color:#2a1d08}
    .btn:hover{background:#d9b85e}
    .btn.ghost{background:#efe0bd}
    a.btn{text-decoration:none}
    main{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start;padding:12px 14px;max-width:1000px}
    .mc{position:relative;flex:1 1 560px;min-width:300px}
    .mc canvas{width:100%;height:auto;display:block;border-radius:6px;cursor:crosshair;box-shadow:0 2px 10px rgba(40,28,12,.3)}
    .mt{position:absolute;pointer-events:none;background:#2c2010;color:#f1e3c0;font-size:12px;padding:4px 9px;border-radius:5px;opacity:0;transition:opacity .1s;white-space:nowrap;border:1px solid #c8a24a;max-width:230px;line-height:1.3}
    .ml{flex:0 0 216px;background:var(--parch);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.45}
    .ml h3{margin:0 0 6px;font-size:14px;font-style:italic;font-weight:500}
    .ml .row{display:flex;gap:6px;align-items:baseline;margin:3px 0;cursor:pointer}
    .ml .row.dim{cursor:default;opacity:.7}
    .ml .row:not(.dim):hover{color:#8a2b1e}
    .ml .n{width:16px;height:16px;border-radius:50%;color:#fff;font-size:10px;text-align:center;line-height:16px;flex:0 0 auto}
    .ml .meta{color:#6b4a22;font-style:italic;font-size:10.5px}
    .ml hr{border:none;border-top:1px solid var(--line);opacity:.4;margin:8px 0}
    .ml .lk{display:flex;gap:6px;align-items:center;margin:2px 0;font-size:11px}
    .ml .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
    #err{color:#8a2b1e;font-size:12px;padding:0 14px}
  </style>
</head>
<body>
  <header>
    <h1>🗺️ AI-DnD <span class="sub">карта региона — из живого графа движка</span></h1>
    <span class="sp"></span>
    <a href="/" class="btn ghost">← В игру</a>
  </header>
  <div class="ctl">
    <label>seed <input id="seed" type="number" value="0"></label>
    <label>золото <input id="gold" type="number" value="500"></label>
    <input id="do" placeholder="команды через ; — напр.: разузнать у Halia о пещере эха волн; идти в логово; идти в пещеру">
    <button class="btn" id="gen">Сгенерировать</button>
    <button class="btn ghost" id="demo">Демо-сценарий</button>
  </div>
  <div id="err"></div>
  <main>
    <div class="mc"><canvas id="rm" width="728" height="520"></canvas><div class="mt" id="rt"></div></div>
    <div class="ml" id="rl"></div>
  </main>
<script>
const STYLE={
 explored:{c:"#2e7d32",badge:"✓",dash:false,cap:1.0,road:"#3a5a2c",known:true,word:"разведано"},
 confirmed:{c:"#2f6fb0",badge:"✓",dash:false,cap:1.0,road:"#2f6fb0",known:true,word:"подтверждено"},
 hearsay:{c:"#b07a1e",badge:"◌",dash:true,cap:0.5,road:"#b07a1e",known:true,word:"со слов"},
 debunked:{c:"#a33327",badge:"✗",dash:true,cap:0.45,road:"#a33327",known:true,word:"ложь раскрыта"},
 unknown:{c:"#9a8458",badge:"?",dash:true,cap:0.0,road:null,known:false,word:"не открыто"},
};
const cv=document.getElementById('rm'),ctx=cv.getContext('2d'),tip=document.getElementById('rt');
const W=728,H=520,CELL=13,COLS=W/CELL,ROWS=H/CELL,PARCH=[227,207,163];
const dpr=Math.min(2,window.devicePixelRatio||1);cv.width=W*dpr;cv.height=H*dpr;cv.style.aspectRatio=W+'/'+H;ctx.scale(dpr,dpr);
const cx=W*0.5, cy=H*0.53, Rx=258, Ry=176;

// --- процедурный рельеф (декоративный фон, фиксированный) --- //
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function sm(t){return t*t*(3-2*t);}
function noise(seed,sp){const r=mb(seed),gw=Math.ceil(COLS/sp)+2,gh=Math.ceil(ROWS/sp)+2,L=[];for(let i=0;i<gw*gh;i++)L.push(r());
  return function(ax,ay){const x=ax/sp,y=ay/sp,x0=Math.floor(x),y0=Math.floor(y),fx=sm(x-x0),fy=sm(y-y0),g=(i,j)=>L[j*gw+i];
    const a=g(x0,y0),b=g(x0+1,y0),c=g(x0,y0+1),d=g(x0+1,y0+1),t1=a+(b-a)*fx,t2=c+(d-c)*fx;return t1+(t2-t1)*fy;};}
const e1=noise(7,10),e2=noise(23,4.5),e3=noise(51,2),e4=noise(71,1),m1=noise(91,8),m2=noise(33,3);
const EL=new Float32Array(W*H),MO=new Float32Array(W*H);
for(let py=0;py<H;py++)for(let px=0;px<W;px++){const gx=px/CELL,gy=py/CELL;
  let e=e1(gx,gy)*0.55+e2(gx,gy)*0.28+e3(gx,gy)*0.12+e4(gx,gy)*0.05;
  EL[py*W+px]=Math.max(0,Math.min(1,e+0.04));MO[py*W+px]=m1(gx,gy)*0.7+m2(gx,gy)*0.3;}
const DRY=[[0,[214,200,158]],[.30,[203,196,142]],[.50,[187,175,122]],[.66,[167,149,105]],[.80,[141,124,100]],[.90,[151,147,137]],[.97,[243,239,229]],[1.02,[251,249,243]]];
const WET=[[0,[196,196,150]],[.30,[126,152,90]],[.50,[95,125,73]],[.66,[103,123,80]],[.80,[118,117,91]],[.90,[151,147,137]],[.97,[243,239,229]],[1.02,[251,249,243]]];
function ramp(s,e){let i=1;while(i<s.length&&e>s[i][0])i++;const a=s[i-1],b=s[Math.min(i,s.length-1)],t=b[0]>a[0]?Math.max(0,Math.min(1,(e-a[0])/(b[0]-a[0]))):0;return[a[1][0]+(b[1][0]-a[1][0])*t,a[1][1]+(b[1][1]-a[1][1])*t,a[1][2]+(b[1][2]-a[1][2])*t];}
let Lx=-1,Ly=-1,Lz=1.15;const Ln=Math.hypot(Lx,Ly,Lz);Lx/=Ln;Ly/=Ln;Lz/=Ln;const Z=240,AMB=0.42,DIF=0.78;
const off=document.createElement('canvas');off.width=W;off.height=H;const octx=off.getContext('2d');

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function placePos(d){const L=Math.hypot(d.dx,d.dy)||1;return [cx+d.dx/L*Rx, cy+d.dy/L*Ry];}

let HIT=[];
function render(data){
  const TOWN={...data.town,x:cx,y:cy};
  data.sites.forEach(d=>{const[x,y]=placePos(d);d.x=x;d.y=y;});
  // источники видимости
  const SRC=[{x:cx,y:cy,r0:80,r1:150,cap:1}];
  data.sites.forEach(d=>{const st=STYLE[d.display]||STYLE.unknown;if(st.cap>0)SRC.push({x:d.x,y:d.y,r0:58,r1:118,cap:st.cap});});
  function reveal(px,py){let m=0;for(const s of SRC){const dd=Math.hypot(px-s.x,py-s.y);const v=s.cap*(1-sm(Math.max(0,Math.min(1,(dd-s.r0)/(s.r1-s.r0)))));if(v>m)m=v;if(m>=1)break;}return m;}
  // рельеф + туман
  const img=octx.createImageData(W,H),D=img.data;
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){const i=py*W+px,e=EL[i],rev=reveal(px,py),o=i*4;
    const pm=((px*5+py*11)%5-2)*1.0;
    if(rev<=0.001){D[o]=PARCH[0]+pm;D[o+1]=PARCH[1]+pm;D[o+2]=PARCH[2]+pm;D[o+3]=255;continue;}
    const dry=ramp(DRY,e),wet=ramp(WET,e),w=Math.max(0,Math.min(1,(MO[i]-0.32)/0.42));
    let R=dry[0]+(wet[0]-dry[0])*w,G=dry[1]+(wet[1]-dry[1])*w,B=dry[2]+(wet[2]-dry[2])*w;
    const xl=Math.max(0,px-2),xr=Math.min(W-1,px+2),yt=Math.max(0,py-2),yb=Math.min(H-1,py+2);
    const sx=(EL[py*W+xr]-EL[py*W+xl])/(xr-xl)*Z,sy=(EL[yb*W+px]-EL[yt*W+px])/(yb-yt)*Z;
    const nl=Math.max(0,(-sx*Lx-sy*Ly+Lz)/Math.sqrt(sx*sx+sy*sy+1)),sh=AMB+DIF*nl;
    R*=sh;G*=sh;B*=sh;
    const fr=(e/0.05)-Math.floor(e/0.05);if(fr<0.07){R*=0.9;G*=0.9;B*=0.9;}
    const mn=(((px*131+py*57)%17)/17-0.5)*6;R+=mn;G+=mn;B+=mn;
    R=Math.max(0,Math.min(255,R));G=Math.max(0,Math.min(255,G));B=Math.max(0,Math.min(255,B));
    D[o]=(PARCH[0]+pm)*(1-rev)+R*rev;D[o+1]=(PARCH[1]+pm)*(1-rev)+G*rev;D[o+2]=(PARCH[2]+pm)*(1-rev)+B*rev;D[o+3]=255;}
  octx.putImageData(img,0,0);ctx.clearRect(0,0,W,H);ctx.imageSmoothingEnabled=true;ctx.drawImage(off,0,0,W,H);
  // сетка
  ctx.strokeStyle='rgba(60,42,18,0.14)';ctx.lineWidth=0.5;ctx.beginPath();
  for(let x=0;x<=COLS;x++){ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,H);}for(let y=0;y<=ROWS;y++){ctx.moveTo(0,y*CELL);ctx.lineTo(W,y*CELL);}ctx.stroke();
  // тракты + часы
  ctx.lineCap='round';ctx.textAlign='center';ctx.textBaseline='middle';
  data.sites.forEach(d=>{const st=STYLE[d.display]||STYLE.unknown;if(!st.road)return;
    ctx.strokeStyle=st.road;ctx.lineWidth=st.dash?1.6:2.4;ctx.setLineDash(st.dash?[6,5]:[]);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(d.x,d.y);ctx.stroke();ctx.setLineDash([]);
    if(d.hours!=null){const mx=(cx+d.x)/2,my=(cy+d.y)/2,lbl=d.hours+' ч';ctx.font='11px Georgia';const tw=ctx.measureText(lbl).width;
      ctx.fillStyle='rgba(239,224,189,0.92)';ctx.strokeStyle='#7a5a2a';ctx.lineWidth=0.7;rr(mx-tw/2-5,my-9,tw+10,18,4);ctx.fill();ctx.stroke();
      ctx.fillStyle='#3a2a12';ctx.fillText(lbl,mx,my+0.5);}});
  // виньетка + рамка
  const vg=ctx.createRadialGradient(W*0.5,H*0.46,H*0.34,W*0.5,H*0.5,H*0.86);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(40,28,12,0.40)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#4a3415';ctx.lineWidth=5;ctx.strokeRect(6,6,W-12,H-12);ctx.lineWidth=1;ctx.setLineDash([2,4]);ctx.strokeStyle='#8a6a36';ctx.strokeRect(13,13,W-26,H-26);ctx.setLineDash([]);
  // медальоны
  function medallion(x,y,ring,dash,label,badge,isTown,here){
    ctx.save();ctx.shadowColor='rgba(0,0,0,0.35)';ctx.shadowBlur=4;ctx.shadowOffsetY=1;
    ctx.beginPath();ctx.arc(x,y,isTown?13:11,0,7);ctx.fillStyle=isTown?'#f4e8c8':'rgba(244,232,200,0.96)';ctx.fill();ctx.restore();
    ctx.lineWidth=isTown?3:2.4;ctx.strokeStyle=ring;if(dash)ctx.setLineDash([3,2]);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=ring;ctx.font='bold '+(isTown?12:11)+'px Georgia';ctx.fillText(label,x,y+0.5);
    if(badge){ctx.font='bold 11px Georgia';ctx.fillText(badge,x+(isTown?13:11),y-(isTown?11:9));}
    if(here){ctx.strokeStyle='#8a2b1e';ctx.lineWidth=1.6;ctx.setLineDash([2,2]);ctx.beginPath();ctx.arc(x,y,16,0,7);ctx.stroke();ctx.setLineDash([]);}
  }
  HIT=[];
  data.sites.forEach((d,i)=>{const st=STYLE[d.display]||STYLE.unknown,here=d.place===data.player_place;
    medallion(d.x,d.y,st.c,st.dash,String(i+1),st.badge,false,here);
    if(d.lied_by){ctx.fillStyle='#a33327';ctx.font='bold 12px Georgia';ctx.fillText('✗',d.x-12,d.y-9);} // солгал источник
    HIT.push({x:d.x,y:d.y,r:14,go:st.known?('идти в '+d.label):null,d,st});});
  medallion(cx,cy,'#5a4222',false,'⌂',null,true,data.player_place===TOWN.place);
  ctx.fillStyle='#3a2a12';ctx.font='italic 12px Georgia';ctx.fillText(TOWN.label,cx,cy+25);
  HIT.push({x:cx,y:cy,r:16,go:TOWN.go,d:{label:TOWN.label+' (родной город)',dir_ru:'центр',hours:0,terrain:'фронтирный городок'},st:{word:'дом'}});
  // компас + картуш
  ctx.save();ctx.translate(W-52,58);ctx.fillStyle='rgba(244,232,200,0.82)';ctx.beginPath();ctx.arc(0,0,21,0,7);ctx.fill();ctx.strokeStyle='#4a3415';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#4a3415';ctx.beginPath();ctx.moveTo(0,-23);ctx.lineTo(4,-4);ctx.lineTo(-4,-4);ctx.fill();ctx.fillStyle='#8a6a36';ctx.beginPath();ctx.moveTo(0,23);ctx.lineTo(4,4);ctx.lineTo(-4,4);ctx.fill();ctx.beginPath();ctx.moveTo(23,0);ctx.lineTo(4,4);ctx.lineTo(4,-4);ctx.fill();ctx.beginPath();ctx.moveTo(-23,0);ctx.lineTo(-4,4);ctx.lineTo(-4,-4);ctx.fill();
  ctx.fillStyle='#3a2a12';ctx.font='bold 9px Georgia';ctx.fillText('С',0,-27);ctx.restore();
  ctx.fillStyle='rgba(203,176,121,0.92)';ctx.strokeStyle='#5a4222';ctx.lineWidth=1.4;rr(W/2-160,16,320,30,5);ctx.fill();ctx.stroke();
  ctx.fillStyle='#3a2a12';ctx.font='italic 16px Georgia';ctx.textAlign='center';ctx.fillText('Окрестности Фэндалина',W/2,31);
  // легенда
  document.getElementById('rl').innerHTML='<h3>Локации</h3>'+data.sites.map((d,i)=>{const st=STYLE[d.display]||STYLE.unknown;
    return `<div class="row ${st.known?'':'dim'}" data-go="${st.known?('идти в '+d.label):''}">`+
      `<span class="n" style="background:${st.c}">${i+1}</span><span><b>${d.label}</b> — ${d.dir_ru}${d.hours!=null?', '+d.hours+' ч пути':''}`+
      `<br><span class="meta">${st.word}${d.source?' · '+d.source:''}`+
      `${d.lied_by?' · <span style="color:#a33327">✗ '+d.lied_by+' солгал(а)</span>':''}</span></span></div>`;}).join('')+
    '<hr><div class="lk"><span class="dot" style="background:#2e7d32"></span>разведано лично ✓</div>'+
    '<div class="lk"><span class="dot" style="background:#2f6fb0"></span>подтверждено визитом ✓</div>'+
    '<div class="lk"><span class="dot" style="background:#b07a1e"></span>со слов NPC ◌</div>'+
    '<div class="lk"><span class="dot" style="background:#a33327"></span>ложь раскрыта ✗</div>'+
    '<div class="lk"><span class="dot" style="background:#9a8458"></span>не открыто ?</div>'+
    '<hr><div class="meta">позиции — стороны света графа; часы — _travel_cost; состояния — map_view() игрока. Клик по известной локации «идёт» туда и перерисовывает.</div>';
  document.querySelectorAll('#rl [data-go]').forEach(el=>{const go=el.getAttribute('data-go');if(go)el.onclick=()=>walkTo(go);});
}

async function generate(){
  const seed=document.getElementById('seed').value||0, gold=document.getElementById('gold').value||0;
  const doStr=document.getElementById('do').value||"";
  const err=document.getElementById('err');err.textContent='';
  try{
    const u=`/region_map?seed=${encodeURIComponent(seed)}&gold=${encodeURIComponent(gold)}&do=${encodeURIComponent(doStr)}`;
    const r=await fetch(u);if(!r.ok)throw new Error('HTTP '+r.status);
    render(await r.json());
  }catch(e){err.textContent='Ошибка генерации: '+e.message;}
}
function walkTo(go){const inp=document.getElementById('do');inp.value=(inp.value.trim()?inp.value.trim().replace(/;?\s*$/,'; '):'')+go;generate();}

cv.addEventListener('mousemove',ev=>{const r=cv.getBoundingClientRect(),mx=(ev.clientX-r.left)/r.width*W,my=(ev.clientY-r.top)/r.height*H;
  let h=null;for(const o of HIT)if(Math.hypot(mx-o.x,my-o.y)<=o.r){h=o;break;}
  if(h){tip.innerHTML=`<b>${h.d.label}</b><br>${h.d.dir_ru}${h.d.hours?', ~'+h.d.hours+' ч пути':''}<br>${h.st.word}`+(h.d.terrain?'<br><i>'+h.d.terrain+'</i>':'');
    tip.style.left=Math.min(W-190,h.x+12)+'px';tip.style.top=(h.y-30)+'px';tip.style.opacity=1;cv.style.cursor=h.go?'pointer':'default';}
  else{tip.style.opacity=0;cv.style.cursor='crosshair';}});
cv.addEventListener('mouseleave',()=>tip.style.opacity=0);
cv.addEventListener('click',ev=>{const r=cv.getBoundingClientRect(),mx=(ev.clientX-r.left)/r.width*W,my=(ev.clientY-r.top)/r.height*H;
  for(const o of HIT)if(Math.hypot(mx-o.x,my-o.y)<=o.r&&o.go){walkTo(o.go);break;}});

document.getElementById('gen').onclick=generate;
document.getElementById('demo').onclick=()=>{document.getElementById('seed').value=0;document.getElementById('gold').value=500;
  // реалистичная цепочка: продавцы должны быть рядом (Toblen в таверне, Halia в ратуше),
  // ложь раскрывается ВИЗИТОМ к месту
  document.getElementById('do').value=[
    "разузнать у Toblen о замке Крэгмо",        // честный трактирщик → со слов
    "идти в ратушу",                            // к Halia (Жентарим)
    "разузнать у Halia о Вайверн-Торе",         // жулик
    "разузнать у Halia о пещере эха волн",      // жулик
    "идти в логово","идти в пещеру",            // разведать Крэгмо
    "идти в вайверн-тор","идти в пещеру эха волн" // проверить наводки Halia на месте
  ].join("; ");generate();};
generate();
</script>
</body>
</html>
