<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-DnD</title>
<style>
  :root{
    --bg:#0f1116; --panel:#171a22; --panel2:#1e222c; --raise:#242938;
    --line:#2a2f3c; --line2:#353b4a;
    --ink:#e9e6dd; --dim:#9aa0ad; --faint:#6c7280;
    --gold:#d9a441; --gold-dim:#8a6f34;
    --green:#5db07a; --blue:#5698e0; --red:#d9615a; --violet:#9b7bd4;
    --serif:"Iowan Old Style",Georgia,"Times New Roman",serif;
    --sans:-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 var(--sans);overflow:hidden}
  .top{height:46px;display:flex;align-items:center;gap:14px;padding:0 18px;
    border-bottom:1px solid var(--line);background:var(--panel)}
  .brand{font:600 15px var(--serif);letter-spacing:.02em;color:var(--gold)}
  .loc{color:var(--dim);font-size:13px;display:flex;align-items:center;gap:7px}
  .loc b{color:var(--ink);font-weight:500}
  .loc .sep{color:var(--faint)}
  .top .right{margin-left:auto;display:flex;gap:16px;color:var(--dim);font-size:12.5px}
  .stage{display:flex;gap:12px;padding:12px;height:calc(100vh - 46px)}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:12px;min-width:0;
    display:flex;flex-direction:column;overflow:hidden}
  .left{flex:0 0 300px;transition:flex-basis .35s ease}
  .center{flex:1}
  .right{flex:0 0 260px;transition:flex-basis .35s ease}
  body.dialogue .right{flex-basis:190px}
  .cap{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);padding:11px 14px 6px}
  .map{flex:1;position:relative;margin:6px 10px 10px;border:1px solid var(--line);border-radius:9px;
    background:var(--panel2);overflow:hidden}
  .map svg{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
  .map svg.drag{cursor:grabbing}
  .zoom{position:absolute;left:8px;bottom:8px;display:flex;align-items:center;gap:2px;
    background:rgba(15,17,22,.82);border:1px solid var(--line2);border-radius:8px;padding:2px}
  .zoom button{background:transparent;border:0;color:var(--ink);font:500 16px var(--sans);
    width:26px;height:24px;cursor:pointer;border-radius:6px}
  .zoom button:hover{background:var(--raise);color:var(--gold)}
  .zoom span{font-size:10.5px;color:var(--dim);min-width:34px;text-align:center;font-variant-numeric:tabular-nums}
  .gobtn{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);background:var(--gold);
    border:0;color:#1a1408;font:600 13px var(--sans);padding:8px 20px;border-radius:22px;cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.45);animation:rise .2s ease;white-space:nowrap}
  .gobtn:hover{filter:brightness(1.08)}
  .gobtn span{opacity:.72;font-weight:500}
  #citybase{filter:brightness(.72) saturate(.86) contrast(1.03);pointer-events:none;transition:filter 1s ease}
  #skyrect{transition:fill 1s ease,opacity 1s ease}
  #citybase .h{pointer-events:auto;cursor:pointer;transition:fill .1s}
  #citybase .h:hover{fill:#ffdf87}
  #citybase .h.sel{fill:#ffd23f}
  .kmark{fill:#f4eddb;font-weight:600;paint-order:stroke;stroke:#140d04;stroke-width:.7px;
    cursor:pointer;pointer-events:auto}
  .kmark:hover{fill:#ffe6a8}
  .locard{margin:0 10px 10px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--panel2)}
  .locard .nm{font:500 14px var(--serif);color:var(--gold)}
  .locard .kd{font-size:12px;color:var(--dim);margin-top:1px}
  .locard .desc{font-size:12.5px;color:var(--dim);margin-top:7px;line-height:1.55}
  .conts{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .cont{font-size:11px;padding:2px 8px;border-radius:6px;background:#171a22;border:1px solid var(--line2);color:var(--dim)}
  .cont.lk{color:var(--gold-dim);border-color:var(--gold-dim)}
  .keys{display:flex;flex-wrap:wrap;gap:6px}
  .keychip{font-size:11.5px;padding:3px 9px;border-radius:6px;background:rgba(217,164,65,.1);
    border:1px solid var(--gold-dim);color:var(--gold)}
  .npc{flex:1;display:flex;flex-direction:column;padding:0 12px 12px;overflow:auto}
  .portrait{width:100%;height:210px;flex:0 0 210px;border-radius:9px;border:1px solid var(--line2);
    background:radial-gradient(120% 100% at 50% 0%,#2a2f3e,#171a22);position:relative;overflow:hidden;
    display:flex;align-items:flex-end;justify-content:center}
  .portrait img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 22%;
    border-radius:9px;transition:opacity .25s}
  .portrait .frame{position:absolute;inset:0;border-radius:9px;box-shadow:inset 0 0 0 1px rgba(217,164,65,.25)}
  .portrait .badge{position:absolute;top:8px;right:8px;font-size:10px;color:var(--gold-dim);z-index:1;
    background:rgba(0,0,0,.45);border:1px solid var(--gold-dim);border-radius:20px;padding:2px 8px}
  .av img{width:100%;height:100%;object-fit:cover;object-position:center 20%;border-radius:8px}
  .npc .who{display:flex;align-items:baseline;gap:8px;margin:10px 2px 2px}
  .npc .who .name{font:500 17px var(--serif);color:var(--ink)}
  .npc .who .role{font-size:12px;color:var(--dim)}
  .npcsub{font-size:11.5px;color:var(--faint);margin:3px 2px 0}
  .meter{display:grid;grid-template-columns:58px 1fr 30px;align-items:center;gap:8px;margin:7px 2px 0}
  .meter .ml{font-size:11px;color:var(--dim)}
  .meter .mv{font-size:11px;color:var(--faint);text-align:right;font-variant-numeric:tabular-nums}
  .track{height:6px;background:#12151c;border-radius:6px;overflow:hidden}
  .track i{display:block;height:100%;border-radius:6px}
  .emo{margin:12px 2px 0;font-size:12px;color:var(--dim)}
  .emo b{color:var(--violet);font-weight:500}
  .subcap{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin:14px 2px 6px}
  .topics{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:12px;padding:4px 11px;border-radius:20px;background:var(--panel2);
    border:1px solid var(--line2);color:var(--ink);cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--gold-dim);color:var(--gold)}
  .end{margin-top:14px;width:100%;padding:9px;border-radius:9px;background:transparent;
    border:1px solid var(--line2);color:var(--dim);font:inherit;cursor:pointer}
  .end:hover{border-color:var(--red);color:var(--red)}
  .thread{flex:1;overflow:auto;padding:16px 20px}
  .msg{max-width:88%;margin:0 0 16px;animation:rise .28s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.narr{font:italic 15px/1.65 var(--serif);color:#cfcabc;border-left:2px solid var(--gold-dim);padding-left:14px}
  .msg.npc .sp{font:500 13px var(--sans);color:var(--gold);margin-bottom:2px}
  .msg.npc .tx{font:15px/1.6 var(--serif);color:var(--ink)}
  .msg.me{margin-left:auto;text-align:right;color:var(--dim)}
  .msg.me .tx{font-size:14px}
  .msg.me .tx::before{content:"\276f  ";color:var(--gold-dim)}
  .msg.sys{font-size:12px;color:var(--faint);text-align:center;font-style:italic;max-width:100%}
  .inbar{border-top:1px solid var(--line);padding:12px 16px;display:flex;gap:10px;align-items:center}
  .inbar input{flex:1;background:var(--panel2);border:1px solid var(--line2);border-radius:22px;
    color:var(--ink);font:14px var(--sans);padding:10px 16px;outline:none}
  .inbar input:focus{border-color:var(--gold-dim)}
  .inbar button{background:var(--gold);border:0;color:#1a1408;font:500 18px var(--sans);width:44px;height:40px;
    border-radius:22px;cursor:pointer}
  .inbar button:hover{filter:brightness(1.08)}
  .amb{padding:2px 12px 12px;display:flex;flex-direction:column;gap:12px;overflow:auto}
  .amchips{display:flex;flex-wrap:wrap;gap:6px}
  .amchip{font-size:11.5px;padding:4px 10px;border-radius:20px;background:var(--panel2);
    border:1px solid var(--line);color:var(--dim)}
  .here{display:flex;flex-direction:column;gap:6px}
  .person{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:9px;
    border:1px solid transparent;cursor:pointer;transition:.15s}
  .person:hover{background:var(--panel2);border-color:var(--line2)}
  .av{width:34px;height:34px;border-radius:8px;flex:0 0 34px;display:flex;align-items:center;
    justify-content:center;font:500 13px var(--sans);color:#151109}
  .person .pn{font-size:13px;color:var(--ink)}
  .person .pr{font-size:11px;color:var(--faint)}
  .person .go{margin-left:auto;color:var(--faint);font-size:17px}
  .person:hover .go{color:var(--gold)}
  .event{font:italic 12.5px/1.55 var(--serif);color:var(--dim);border-left:2px solid var(--line2);padding-left:11px}
  .hidden{display:none}
  .miniscene{padding:2px 12px 12px;display:flex;flex-direction:column;gap:10px}
</style>
</head>
<body class="explore">

<div class="top">
  <span class="brand">&#10022; AI-DnD</span>
  <span class="loc"><b id="locname">Трактир</b><span class="sep">·</span><span id="locdist">рыночный квартал</span></span>
  <span class="right"><span id="clock">вечер, 19:40</span><span>дождь</span><span>&#9829; 18/18</span><span>12 зм</span></span>
</div>

<div class="stage">
  <div class="col left">
    <div id="mapwrap">
      <div class="cap">карта <span id="here-lbl" style="color:var(--gold)"></span></div>
      <div class="map" id="mapbox"><svg id="mapsvg"></svg>
        <div class="zoom"><button onclick="zoomBy(1/1.4)" aria-label="отдалить">&#8722;</button>
          <span id="zlvl">100%</span>
          <button onclick="zoomBy(1.4)" aria-label="приблизить">&#43;</button>
          <button onclick="recenter()" title="к игроку" style="font-size:12px">&#9678;</button></div>
        <button id="gobtn" class="gobtn hidden" onclick="go()">&#9654; идти <span id="goeta"></span></button>
      </div>
      <div class="locard">
        <div class="nm">Трактир</div><div class="kd">таверна</div>
        <div class="desc">…</div>
      </div>
    </div>
    <div id="npcwrap" class="npc hidden"></div>
  </div>

  <div class="col center">
    <div class="cap">повествование</div>
    <div class="thread" id="thread"></div>
    <div class="inbar">
      <input id="inp" placeholder="что делаешь?" autocomplete="off">
      <button id="send">&#8594;</button>
    </div>
  </div>

  <div class="col right">
    <div class="cap" id="rightcap">сцена</div>
    <div class="amb" id="amb"></div>
    <div class="miniscene hidden" id="mini"></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
let mode='explore', cur=null, SCENE={here:[],ambient:{}}, CARD=null;
const api=(u,b)=>fetch(u,b?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}:{}).then(r=>r.json());
const esc=s=>String(s==null?'':s).replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
const byId=id=>SCENE.here.find(x=>x.id===id)||{name:id,init:'?',color:'#8a6fae'};
const thread=()=>$('thread');
function push(cls,html){const d=document.createElement('div');d.className='msg '+cls;d.innerHTML=html;
  thread().appendChild(d);thread().scrollTop=thread().scrollHeight;return d;}

let MAP=null,BVB=[0,0,100,100],Z=1,CX=50,CY=50,PXY={x:50,y:50},PANNED=false;
let CRXY={},PEND=null,SELEL=null,MINPERSTEP=5,GT=19*60+40;   // игровые минуты; +5 за каждый шаг пути
const STEP_MS=240;                                          // реальная длительность одного шага анимации
function fmtClock(t){t=((t%1440)+1440)%1440;const h=Math.floor(t/60),m=t%60;
  const per=h<5?'ночь':h<11?'утро':h<17?'день':h<22?'вечер':'ночь';
  return per+', '+String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
// палитра суточного цикла: контрольные точки по часам → фильтр карты + цвет неба-подложки
const SKY=[
  {h:0, br:.46,sat:.70,ov:[10,16,46], oo:.52},   // глухая ночь — синь
  {h:5, br:.50,sat:.72,ov:[18,24,56], oo:.46},   // предрассветье
  {h:7, br:.80,sat:.94,ov:[74,60,84], oo:.20},   // рассвет — прохладно-розовый
  {h:10,br:1.00,sat:1.0,ov:[255,246,214],oo:.05},// утро
  {h:13,br:1.03,sat:1.0,ov:[255,242,206],oo:.02},// полдень — ярко и тепло
  {h:17,br:.94,sat:1.05,ov:[176,104,44],oo:.14}, // предвечерье — золото
  {h:19,br:.78,sat:1.07,ov:[126,60,30], oo:.26}, // закат — оранжево-тёплый
  {h:21,br:.60,sat:.90,ov:[52,34,66],  oo:.36},  // сумерки — фиолетовый
  {h:23,br:.50,sat:.74,ov:[14,20,56],  oo:.46},  // ночь
  {h:24,br:.46,sat:.70,ov:[10,16,46],  oo:.52},
];
function applySky(){const t=((GT/60)%24+24)%24;let a=SKY[0],b=SKY[SKY.length-1];
  for(let i=0;i<SKY.length-1;i++){if(t>=SKY[i].h&&t<=SKY[i+1].h){a=SKY[i];b=SKY[i+1];break;}}
  const f=(b.h-a.h)?(t-a.h)/(b.h-a.h):0,L=(x,y)=>x+(y-x)*f;
  const base=$('mapsvg').querySelector('#citybase');
  if(base)base.style.filter=`brightness(${L(a.br,b.br).toFixed(3)}) saturate(${L(a.sat,b.sat).toFixed(3)}) contrast(1.03)`;
  const rect=$('mapsvg').querySelector('#skyrect');
  if(rect){rect.style.fill=`rgb(${[0,1,2].map(k=>Math.round(L(a.ov[k],b.ov[k]))).join(',')})`;
    rect.style.opacity=L(a.oo,b.oo).toFixed(3);}}
function setClock(){const c=$('clock');if(c)c.textContent=fmtClock(GT);applySky();}
function applyVB(){const w=BVB[2]/Z,h=BVB[3]/Z;
  $('mapsvg').setAttribute('viewBox',`${(CX-w/2).toFixed(1)} ${(CY-h/2).toFixed(1)} ${w.toFixed(1)} ${h.toFixed(1)}`);
  $('zlvl').textContent=Math.round(Z*100)+'%';}
function svgEl(m){
  const W=BVB[2],rpl=W*0.0092,lw=W*0.0022,fs=W*0.015;
  let g=`<g id="citybase">${m.svg||''}</g>`;
  g+=`<rect id="skyrect" x="0" y="0" width="${BVB[2]}" height="${BVB[3]}" fill="#0b1226" opacity=".22" pointer-events="none"/>`;
  m.keys.forEach(k=>g+=`<text class="kmark" data-id="${k.node}" x="${k.x}" y="${k.y-rpl*1.9}" font-size="${fs.toFixed(1)}" text-anchor="middle">${k.label}</text>`);
  g+=`<g id="destmark" pointer-events="none" style="display:none">
      <circle fill="none" stroke="#e5372a" stroke-width="${lw}"><animate attributeName="r" values="${rpl*0.5};${rpl*1.9};${rpl*0.5}" dur="1.05s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0;1" dur="1.05s" repeatCount="indefinite"/></circle>
      <circle r="${rpl*0.5}" fill="#e5372a" stroke="#3a0d08" stroke-width="${lw*0.5}"><animate attributeName="r" values="${rpl*0.42};${rpl*0.58};${rpl*0.42}" dur="1.05s" repeatCount="indefinite"/></circle></g>`;
  g+=`<g id="pmark" transform="translate(${PXY.x},${PXY.y})" pointer-events="none">
      <circle r="${rpl}" fill="#d9a441" stroke="#241a08" stroke-width="${lw}"/>
      <circle r="${rpl}" fill="none" stroke="#ffe6a8" opacity=".55"><animate attributeName="r" values="${rpl};${rpl*2.6};${rpl}" dur="2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".7;0;.7" dur="2.2s" repeatCount="indefinite"/></circle></g>`;
  return g;
}
function showDest(x,y){const d=$('mapsvg').querySelector('#destmark');
  if(d){d.setAttribute('transform','translate('+x+','+y+')');d.style.display='';}}
function hideDest(){const d=$('mapsvg').querySelector('#destmark');if(d)d.style.display='none';}
function renderMap(){const s=$('mapsvg');s.innerHTML=svgEl(MAP);applyVB();
  s.querySelectorAll('.kmark').forEach(e=>e.addEventListener('click',ev=>{
    ev.stopPropagation();if(!PANNED)selectDest(+e.dataset.id,null);}));
  s.querySelectorAll('#citybase .h').forEach(e=>e.addEventListener('click',ev=>{
    ev.stopPropagation();if(PANNED)return;const nd=MAP.h2n[e.dataset.id];if(nd!=null)selectDest(nd,e);}));
  applySky();}
async function loadMap(){MAP=await api('/api/play/map');if(!MAP||!MAP.viewBox)return;
  BVB=MAP.viewBox;PXY=MAP.player;CX=PXY.x;CY=PXY.y;Z=Math.max(1.5,BVB[2]/560);
  CRXY={};(MAP.points||[]).forEach(p=>CRXY[p.id]=[p.x,p.y]);setClock();renderMap();}
function zoomBy(f){Z=Math.min(20,Math.max(0.85,Z*f));applyVB();}
function recenter(){CX=PXY.x;CY=PXY.y;Z=Math.max(Z,BVB[2]/560);applyVB();}
function clientToWorld(cx,cy){const s=$('mapsvg'),r=s.getBoundingClientRect(),w=BVB[2]/Z,h=BVB[3]/Z;
  return [CX-w/2+(cx-r.left)/r.width*w, CY-h/2+(cy-r.top)/r.height*h];}
function nearestCr(x,y){let best=null,bd=1e18;(MAP.points||[]).forEach(p=>{
  const d=(p.x-x)**2+(p.y-y)**2;if(d<bd){bd=d;best=p;}});return best;}
function clearSel(){const b=$('mapsvg').querySelector('#citybase');
  if(b)b.querySelectorAll('.h.sel').forEach(x=>x.classList.remove('sel'));SELEL=null;PEND=null;hideDest();$('gobtn').classList.add('hidden');}
function selectDest(cr,houseEl){
  if(cr==null)return;
  const b=$('mapsvg').querySelector('#citybase');
  if(b)b.querySelectorAll('.h.sel').forEach(x=>x.classList.remove('sel'));
  SELEL=houseEl||null;if(houseEl)houseEl.classList.add('sel');
  PEND=cr;const c=CRXY[cr];if(c)showDest(c[0],c[1]);
  $('goeta').textContent='';$('gobtn').classList.remove('hidden');
}
function walk(path){return new Promise(res=>{if(!path||!path.length){res();return;}let i=1;
  const pm=$('mapsvg').querySelector('#pmark');
  const step=()=>{const p=path[i];PXY={x:p[0],y:p[1]};
    if(pm)pm.setAttribute('transform','translate('+p[0]+','+p[1]+')');
    CX=p[0];CY=p[1];applyVB();GT+=MINPERSTEP;setClock();
    i++;if(i<path.length)setTimeout(step,STEP_MS);else res();};
  setTimeout(step,STEP_MS);});}
async function go(){
  if(PEND==null)return;const id=PEND;
  if(mode==='dialogue')endTalk();
  $('gobtn').classList.add('hidden');
  const r=await api('/api/play/move',{to:id});
  if(r.error){push('sys',r.error);clearSel();return;}
  const path=r.path||[];
  if(path.length){const d=path[path.length-1];showDest(d[0],d[1]);}
  await walk(path);
  hideDest();PEND=null;
  MAP.loc=r.loc;SCENE=r;renderAmb();
  $('locname').textContent=r.location.name;$('here-lbl').textContent='· '+(r.moved||r.location.name);
  renderLoc(r.location);
  push('narr','Ты доходишь до «'+(r.moved||r.location.name)+'» ('+fmtClock(GT).split(', ')[1]+').');
}
(function(){const s=$('mapsvg');let drag=null;
  s.addEventListener('mousedown',e=>{drag={x:e.clientX,y:e.clientY,cx:CX,cy:CY};PANNED=false;s.classList.add('drag');});
  window.addEventListener('mousemove',e=>{if(!drag)return;const r=s.getBoundingClientRect();
    if(Math.abs(e.clientX-drag.x)+Math.abs(e.clientY-drag.y)>3)PANNED=true;
    CX=drag.cx-(e.clientX-drag.x)*(BVB[2]/Z)/r.width;CY=drag.cy-(e.clientY-drag.y)*(BVB[3]/Z)/r.height;applyVB();});
  window.addEventListener('mouseup',()=>{if(drag){drag=null;s.classList.remove('drag');}});
  s.addEventListener('click',e=>{                       // клик по дороге/фону → ближайшая точка
    if(PANNED||e.target.closest('.h,.kmark'))return;
    const [wx,wy]=clientToWorld(e.clientX,e.clientY);const p=nearestCr(wx,wy);
    if(p)selectDest(p.id,null);});
  s.addEventListener('wheel',e=>{e.preventDefault();const r=s.getBoundingClientRect(),w=BVB[2]/Z,h=BVB[3]/Z;
    const mx=CX-w/2+(e.clientX-r.left)/r.width*w,my=CY-h/2+(e.clientY-r.top)/r.height*h;
    const nz=Math.min(20,Math.max(0.85,Z*(e.deltaY<0?1.2:1/1.2)));
    CX=mx+(CX-mx)*(Z/nz);CY=my+(CY-my)*(Z/nz);Z=nz;applyVB();},{passive:false});
})();

function renderAmb(){
  const a=SCENE.ambient||{};
  $('amb').innerHTML=
    `<div class="amchips">${[a.time,a.weather,a.mood].filter(Boolean).map(x=>`<span class="amchip">${esc(x)}</span>`).join('')}</div>
     <div><div class="subcap" style="margin:2px 0 6px">кто здесь</div>
       <div class="here">${SCENE.here.map(n=>
         `<div class="person" onclick="talk('${n.id}')"><span class="av" style="background:${n.color}">${av(n)}</span>
           <span><div class="pn">${esc(n.name)}</div><div class="pr">${esc(n.role)}</div></span>
           <span class="go">&#8250;</span></div>`).join('')}</div></div>
     ${a.event?`<div class="event">${esc(a.event)}</div>`:''}`;
}
function renderMini(){
  const a=SCENE.ambient||{};
  $('mini').innerHTML=`<div class="amchips"><span class="amchip">${esc(a.time||'вечер')}</span></div>
    <div><div class="subcap" style="margin:2px 0 6px">рядом</div>
    <div class="here">${SCENE.here.filter(x=>x.id!==cur).map(n=>
      `<div class="person" onclick="talk('${n.id}')"><span class="av" style="background:${n.color}">${av(n)}</span>
        <span><div class="pn">${esc(n.name)}</div></span></div>`).join('')}</div></div>`;
}
const av=n=>n.portrait?`<img src="${encodeURI(n.portrait)}" alt="">`:esc(n.init);
const bar=(v,c)=>`<div class="track"><i style="width:${Math.round((+v||0)*100)}%;background:${c}"></i></div>`;
function meters(n){return `<div class="meter"><span class="ml">симпатия</span>${bar(n.aff,'var(--green)')}<span class="mv">${(+n.aff).toFixed(2)}</span></div>
  <div class="meter"><span class="ml">доверие</span>${bar(n.trust,'var(--blue)')}<span class="mv">${(+n.trust).toFixed(2)}</span></div>
  <div class="meter"><span class="ml">страх</span>${bar(n.fear,'var(--red)')}<span class="mv">${(+n.fear).toFixed(2)}</span></div>`;}
function renderNpc(n){
  const col=byId(cur).color||n.color||'#8a6fae';
  const face=n.portrait
    ? `<img id="npcimg" src="${encodeURI(n.portrait)}" alt="">`
    : `<svg width="96" height="118" viewBox="0 0 96 118"><circle cx="48" cy="42" r="26" fill="${col}" opacity=".9"/>
         <path d="M8 118 C8 82 30 74 48 74 C66 74 88 82 88 118 Z" fill="${col}" opacity=".9"/></svg>`;
  const sub=[n.age&&({young:'молодой',adult:'взрослый',middle:'в годах',old:'пожилой',elder:'старый'}[n.age]),
             n.origin].filter(Boolean).join(' · ');
  $('npcwrap').innerHTML=
    `<div class="cap" style="padding:11px 2px 8px">собеседник</div>
     <div class="portrait">${face}<div class="frame"></div><span class="badge" id="pbadge">${esc(n.emotion||'')}</span></div>
     <div class="who"><span class="name">${esc(n.name)}</span><span class="role">${esc(n.role)}</span></div>
     ${sub?`<div class="npcsub">${esc(sub)}</div>`:''}
     <div id="meters">${meters(n)}</div>
     <div class="emo">настроение: <b id="emo">${esc(n.emotion)}</b></div>
     ${(n.keys&&n.keys.length)?`<div class="subcap">при себе ключи</div>
       <div class="keys">${n.keys.map(k=>`<span class="keychip">&#128273; ${esc(k)}</span>`).join('')}</div>`:''}
     <div class="subcap">темы разговора</div>
     <div class="topics">${(n.topics||[]).map(t=>`<span class="chip" onclick="say('${esc(t)}')">${esc(t)}</span>`).join('')}</div>
     <button class="end" onclick="endTalk()">&#8592; завершить разговор</button>`;
}

async function talk(id){
  cur=id;mode='dialogue';document.body.className='dialogue';
  $('mapwrap').classList.add('hidden');$('npcwrap').classList.remove('hidden');
  $('amb').classList.add('hidden');$('mini').classList.remove('hidden');
  $('inp').placeholder='ответить '+byId(id).name+'…';
  renderMini();push('sys','— ты заговариваешь с '+esc(byId(id).name)+' —');
  const n=await api('/api/play/talk',{npc:id});
  if(n.error){push('sys',esc(n.error));return;}
  CARD=n;renderNpc(n);
  push('npc',`<div class="sp">${esc(n.name)}</div><div class="tx">${esc(n.line)}</div>`);
}
function endTalk(){
  push('sys','— ты отходишь от '+esc(byId(cur).name)+' —');
  cur=null;mode='explore';document.body.className='explore';
  $('mapwrap').classList.remove('hidden');$('npcwrap').classList.add('hidden');
  $('amb').classList.remove('hidden');$('mini').classList.add('hidden');
  $('inp').placeholder='что делаешь?';
}
async function converse(text){
  const id=cur;
  const el=push('npc',`<div class="sp">${esc(byId(id).name)}</div><div class="tx"><span style="color:var(--faint)">…</span></div>`);
  const r=await api('/api/play/say',{npc:id,text});
  if(r.error){el.querySelector('.tx').textContent=r.error;return;}
  el.querySelector('.tx').textContent=r.line;
  if(CARD){Object.assign(CARD,{aff:r.aff,trust:r.trust,fear:r.fear,emotion:r.emotion});
    if($('meters'))$('meters').innerHTML=meters(CARD);if($('emo'))$('emo').textContent=r.emotion;
    if(r.portrait&&$('npcimg'))$('npcimg').src=encodeURI(r.portrait);
    if($('pbadge'))$('pbadge').textContent=r.emotion;}
}
function say(t){push('me',`<div class="tx">${esc(t)}</div>`);converse(t);}
function submit(){
  const v=$('inp').value.trim();if(!v)return;$('inp').value='';
  push('me',`<div class="tx">${esc(v)}</div>`);
  if(mode==='dialogue')converse(v);
  else setTimeout(()=>push('narr','Ты оглядываешь зал. Дождь стучит по ставням; кто-то у очага заводит новую байку.'),220);
}
$('send').onclick=submit;
$('inp').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});

loadMap();
push('narr','Дверь трактира захлопывается за твоей спиной, отрезая шум дождя. Внутри тепло, пахнет элем и подгоревшим луком.');
api('/api/play/scene').then(s=>{
  SCENE=s;renderAmb();
  if(s.location){$('locname').textContent=s.location.name;renderLoc(s.location);}
  push('narr','Десяток лиц скользят по тебе взглядами и возвращаются к кружкам.');
});
function renderLoc(loc){
  document.querySelector('.locard .nm').textContent=loc.name;
  document.querySelector('.locard .kd').textContent=loc.kind;
  const cs=(loc.containers||[]);
  document.querySelector('.locard .desc').innerHTML=esc(loc.desc||'')+(cs.length?
    `<div class="conts">${cs.map(c=>`<span class="cont${c.locked?' lk':''}" title="${esc(c.where||'')}">${c.locked?'&#128274;':'&#9642;'} ${esc(c.name)}</span>`).join('')}</div>`:'');
}
</script>
</body>
</html>
